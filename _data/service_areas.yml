        <p>Every service includes draining the fluid and inspecting it for color, smell, and metal contamination, removing and inspecting the pan for debris, cleaning the pan, replacing the filter and gasket, refilling with the correct fluid, and road testing to confirm shift quality before the vehicle leaves.</p>
      faq:
