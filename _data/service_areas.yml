        - q: "How far is RJ Fox Automotive from Mount Dora?"
          a: "We are at 801 David Walker Dr in Eustis, about ten minutes from downtown Mount Dora via US-441 South. Turn right on David Walker Dr and we are on the right side of the road."
        - q: "Do you rebuild transmissions in-house?"
          a: "Yes. Most shops in the area send transmission jobs to an outside rebuilder. We do the work here. Rob has over 20 years of hands-on transmission experience, which means better quality control and no middleman markup."
        - q: "How do I know if my transmission needs repair or replacement?"
          a: "That depends entirely on what the diagnosis reveals. We diagnose first and give you all your options with honest pricing on each."
        - q: "Do you provide a written estimate before starting?"
          a: "Always. We diagnose the vehicle, write a complete estimate covering parts and labor, and go over it with you before any work begins."
