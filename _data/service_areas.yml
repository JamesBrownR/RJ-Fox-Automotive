        <p>Manual transmission vehicles need clutch work at some point. RJ Fox Automotive handles the full range of clutch repairs at our Eustis shop, about fifteen minutes from Leesburg on US-441 South.</p>
        <p>A complete clutch job at our shop covers the clutch disc, pressure plate, release bearing, and pilot bearing. We inspect and resurface or replace the flywheel every time. If the hydraulic system has issues, we check the master and slave cylinders and replace them where needed.</p>
      faq:
        - q: "How do I know if my clutch needs to be replaced?"
          a: "The clutch slipping under load, the engagement point moving toward the top of the pedal travel, difficulty getting into gear, a burning smell after driving in traffic, or a shudder when releasing the clutch from a stop."
        - q: "Do you resurface the flywheel when replacing the clutch?"
          a: "Every time. Installing new friction material against a worn or glazed flywheel surface leads to premature failure."
        - q: "How long does a clutch replacement take?"
