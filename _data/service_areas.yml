        <p>Advanced driver assistance systems rely on cameras and sensors that must be precisely aimed to work correctly. After a windshield replacement, a wheel alignment, a suspension repair, or any collision repair, ADAS components must be recalibrated. RJ Fox Automotive performs ADAS calibration for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>We perform static and dynamic calibration procedures as required by the vehicle manufacturer. Static calibration uses targets placed at specific distances in front of the vehicle. Dynamic calibration requires a drive under specified conditions.</p>
      faq:
        - q: "Does every windshield replacement require ADAS calibration?"
          a: "If the vehicle has a camera mounted to the windshield or behind it, yes. Most vehicles built after 2018 with automatic emergency braking have a forward-facing camera that requires calibration after windshield replacement."
        - q: "My lane assist turned off after my alignment. Is that related?"
          a: "Yes. A wheel alignment changes the vehicle's geometry, which shifts the camera's reference angle. Calibration restores the camera to the correct position."
        - q: "Can I drive the car if ADAS systems are uncalibrated?"
          a: "You can drive it, but the ADAS features may not work correctly. Automatic emergency braking and lane departure warning may trigger false alerts or fail to trigger when needed."
        - q: "How long does ADAS calibration take?"
          a: "Static calibration takes one to two hours. Dynamic calibration requires a road drive and may take longer."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441. Turn right on David Walker Dr in Eustis."

