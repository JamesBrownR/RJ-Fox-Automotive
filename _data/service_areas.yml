        <p>We perform static and dynamic calibration as required by the manufacturer for your specific year, make, and model. Skipping calibration after the work that requires it means lane departure warning, automatic emergency braking, and adaptive cruise control may not work correctly or may trigger at the wrong times.</p>
      faq:
        - q: "Does every windshield replacement require ADAS calibration?"
          a: "Only if the vehicle has a forward-facing camera mounted to or behind the windshield. Most vehicles built after 2018 with automatic emergency braking do. We can confirm when you call."
        - q: "My lane assist turned off after my alignment. Is that related?"
          a: "Yes. An alignment changes suspension geometry, which shifts the angle at which the camera sees the road. Calibration corrects it."
        - q: "Can I drive the car if ADAS systems are uncalibrated?"
          a: "You can, but the safety features may not function as intended. Automatic emergency braking and lane departure warning can give false alerts or fail to activate when needed."
        - q: "How long does ADAS calibration take?"
          a: "Static calibration takes one to two hours. Dynamic calibration requires a road drive and may take longer."
        - q: "How far is your shop from Leesburg?"
          a: "About fifteen minutes south on US-441. Turn right on David Walker Dr in Eustis."

