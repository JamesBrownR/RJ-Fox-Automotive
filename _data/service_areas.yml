        <p>Engine problems get more expensive the longer they sit. RJ Fox Automotive handles major engine repair at our Eustis facility, about fifteen minutes from Leesburg on US-441 South, on all makes and models.</p>
        <p>We handle head gasket replacement, timing belt and chain service, oil leaks at any location from the valve cover down to the rear main seal, water pump replacement, intake manifold gaskets, and overheating diagnosis and repair. If your engine is running hot, pull over before you drive it further. That is how head gaskets fail.</p>
        <h2>If Your Engine Is Overheating</h2>
