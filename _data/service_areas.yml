          a: "If the vehicle has a camera mounted to the windshield or behind it, yes. Most vehicles built after 2018 with automatic emergency braking have a forward-facing camera that requires calibration after windshield replacement."
        - q: "My lane assist turned off after my alignment. Is that related?"
          a: "Yes. A wheel alignment changes the vehicle's geometry, which shifts the camera's reference angle. Calibration restores the camera to the correct position."
