        <p>We check refrigerant pressure, inspect the compressor, condenser, evaporator, expansion valve, and all lines and fittings before recommending any repair. We do not add refrigerant to a leaking system and call it fixed. We find the leak, repair it, and verify vent temperatures after the recharge.</p>
      faq:
