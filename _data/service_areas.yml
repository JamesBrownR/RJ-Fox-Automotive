        <h2>AC Installation and Repair Near Mount Dora, FL</h2>
        <p>Central Florida heat is relentless. RJ Fox Automotive diagnoses and repairs the full AC system for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>Every AC diagnosis at our shop includes a full system inspection before we recommend any repair. We check refrigerant level and pressure, inspect the compressor, condenser, evaporator, expansion valve, and all hoses and fittings for leaks. We do not recharge leaking systems without finding and fixing the leak first.</p>
      faq:
        - q: "My AC blows warm air. What could cause that?"
          a: "Warm air can be caused by low refrigerant from a leak, a failed compressor, a clogged condenser, a faulty expansion valve, or electrical issues in the control system."
        - q: "Can you just recharge my AC?"
          a: "We recharge AC systems, but we do not recharge a system that has a leak without finding and repairing the leak first."
        - q: "How long does AC repair take?"
          a: "It depends on the repair. A recharge with no leaks takes about an hour. Component replacements take longer."
        - q: "Do you work on all vehicle makes?"
          a: "Yes. Domestic, Asian, and European vehicles of all makes and model years."
        - q: "How far is your shop from Mount Dora?"
