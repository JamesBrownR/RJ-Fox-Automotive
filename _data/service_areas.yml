        <p>Head gasket replacement, timing belt and chain service, oil leak repair from valve cover to rear main seal, water pump replacement, intake manifold gaskets, and overheating diagnosis and repair. If your temperature gauge is climbing, do not keep driving. Call us and we will help you figure out how to get the vehicle to us without turning a fixable problem into a destroyed engine.</p>
