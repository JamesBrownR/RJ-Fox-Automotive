    - slug: auto-exhaust-system-repair
      name: "Exhaust System Repair"
      hero_sub: "Exhaust repair for Tavares vehicles. Mufflers, catalytic converters, pipes, and oxygen sensors."
      body: |
        <h2>Exhaust System Repair Near Tavares, FL</h2>
        <p>A damaged exhaust system is loud, inefficient, and in some cases a safety hazard if exhaust gases enter the cabin. RJ Fox Automotive repairs exhaust systems for all vehicle makes and models at our Eustis shop, about ten minutes from Tavares on US-441 or SR-19 South.</p>
        <p>Florida humidity accelerates rust on exhaust components, and older trucks and vehicles from the Tavares area often develop exhaust leaks at flex pipes, muffler connections, and manifold gaskets. We inspect the full exhaust system from the manifold to the tailpipe and repair only what needs repair.</p>
        <h2>Services</h2>
        <p>Muffler replacement, exhaust pipe repair and replacement, catalytic converter diagnosis and replacement, oxygen sensor replacement, exhaust manifold gasket repair, flex pipe replacement, and hangers. We also diagnose exhaust-related check engine lights and confirm whether catalytic converter codes are caused by a failing converter or by upstream issues like oxygen sensors or exhaust leaks.</p>
      faq:
        - q: "My exhaust sounds louder than normal. What should I check?"
          a: "A new exhaust noise is usually a hole, separation, or crack in the exhaust pipe or muffler. Less commonly it can be an exhaust manifold crack. We inspect the full system to find the source."
        - q: "How long do catalytic converters last?"
          a: "Most catalytic converters last 100,000 miles or more under normal conditions. They fail early if the engine has issues like misfires or oil burning that contaminate the converter."
        - q: "Is an exhaust leak dangerous?"
          a: "An exhaust leak before the passenger compartment can allow carbon monoxide into the cabin, which is a serious health hazard. If you smell exhaust inside the vehicle, have it inspected right away."
        - q: "Can you repair a cracked exhaust manifold?"
          a: "Sometimes. Some cracks can be welded. Others require manifold replacement. We assess the damage and give you the most practical repair option."
        - q: "How far is your shop from Tavares?"
          a: "About ten minutes from downtown Tavares on US-441 or SR-19 South."

    - slug: engine-diagnostics
      name: "Engine Diagnostics"
      hero_sub: "Compression testing, live data, and advanced engine diagnostics for Tavares vehicles."
      body: |
        <h2>Engine Diagnostics Near Tavares, FL</h2>
        <p>Finding the actual cause of an engine problem requires more than reading fault codes. RJ Fox Automotive performs advanced engine diagnostics at our Eustis shop, about ten minutes from Tavares via US-441 or SR-19 South.</p>
        <p>We use professional scan tools for live data analysis, compression testers, leak-down testers, fuel pressure gauges, and ignition system testers to identify the specific cause of engine problems. We do not recommend repairs based on what codes suggest most of the time. We test to confirm the specific failure before writing an estimate.</p>
        <p>Tavares-area drivers who have had expensive repairs elsewhere that did not fix the problem, or who want a second opinion before committing to a major repair, are welcome to bring the vehicle in for an independent assessment.</p>
      faq:
        - q: "Can you diagnose engine problems on diesel vehicles?"
          a: "Yes. We use diesel-specific scan tools and perform the same compression testing, fuel system testing, and mechanical diagnosis on diesel engines as on gasoline engines."
        - q: "What does a compression test involve?"
          a: "We remove each spark plug and use a compression gauge to measure the pressure each cylinder builds. Low compression in one or more cylinders points to internal engine wear or damage."
        - q: "How accurate are engine diagnostics?"
          a: "When performed correctly with the right equipment, very accurate. The limiting factor is usually whether the fault is active and reproducible at the time of diagnosis."
        - q: "Do you charge for a second opinion diagnosis?"
          a: "We charge our standard diagnostic fee, which applies toward the repair if you have the work done with us."
        - q: "How far is your shop from Tavares?"
          a: "About ten minutes from downtown Tavares on US-441 or SR-19 South toward Eustis."

    - slug: air-conditioning
