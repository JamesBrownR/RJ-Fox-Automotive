      body: |
        <h2>Steering and Suspension Repair Near Mount Dora, FL</h2>
        <p>The roads around Mount Dora and through Lake County vary from smooth highway to rough residential streets, and suspension components wear differently depending on the conditions they are exposed to. RJ Fox Automotive handles steering and suspension repairs for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>Worn shocks and struts, failed tie rod ends, loose ball joints, and worn control arm bushings all affect how your vehicle handles and how your tires wear. These problems are easy to miss because they develop gradually. By the time steering feel is noticeably loose or the ride is noticeably rough, the wear is usually significant enough to affect safety.</p>
        <h2>What We Inspect and Repair</h2>
        <p>Shocks and struts, tie rod ends and inner tie rods, ball joints, control arms and bushings, sway bar end links and bushings, power steering pumps and racks, electric power steering diagnosis, and steering column components. After any steering or suspension repair that affects wheel position, we perform a wheel alignment to bring the vehicle back to specification.</p>
      faq:
        - q: "My steering wheel vibrates at highway speed. What could cause that?"
          a: "Vibration at highway speed is most often related to tire balance or a bent wheel, but it can also indicate worn tie rod ends, loose wheel bearings, or worn strut mounts. We inspect the full system to find the cause."
        - q: "How do I know if my shocks or struts are worn?"
          a: "Signs include excessive body roll in turns, nose dive when braking, bouncing after bumps that takes more than one cycle to settle, and uneven tire wear. Most shocks and struts should be inspected every 50,000 miles."
        - q: "Can I drive with a worn tie rod?"
          a: "A worn tie rod is a safety concern. Tie rods connect the steering rack to the wheel hub, and a failed tie rod means loss of steering control. If you have been told you have worn tie rods, do not delay the repair."
        - q: "Do you do wheel alignments after suspension work?"
          a: "Yes. Any suspension or steering repair that changes wheel geometry requires a wheel alignment to restore proper toe, camber, and caster settings."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441 from the Historic District. Turn right on David Walker Dr in Eustis."

    - slug: wheel-alignment
      name: "Wheel Alignment"
      hero_sub: "Precision wheel alignment for Mount Dora vehicles. Correct pulling, uneven tire wear, and steering drift with a proper four-wheel alignment."
      body: |
        <h2>Wheel Alignment Near Mount Dora, FL</h2>
        <p>Wheel alignment affects how your tires wear, how your vehicle handles, and how efficiently it moves down the road. RJ Fox Automotive performs precision wheel alignments for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora via US-441 South.</p>
        <p>The roads in and around Mount Dora, from the residential streets of the Historic District to the highway runs on US-441, expose suspension components to the kind of wear and impact that gradually shifts alignment angles out of specification. Hitting a curb, going through a deep pothole, or simply accumulating mileage can cause alignment to drift.</p>
        <p>We perform four-wheel alignments using alignment equipment that measures all four wheels simultaneously and compares them to manufacturer specifications. We correct toe, camber, and caster where adjustable and document the before-and-after measurements for your records.</p>
        <h2>When Alignment Is Needed</h2>
        <p>The vehicle pulls to one side, the steering wheel is off-center on a straight road, tires are wearing unevenly, or you have had any steering or suspension work done. We also recommend an alignment check after any significant impact such as hitting a curb or a deep pothole.</p>
      faq:
        - q: "How often should I have my alignment checked?"
          a: "Every 12,000 to 15,000 miles or once a year is a reasonable interval, and any time after significant suspension impact or steering and suspension repairs."
        - q: "My car pulls to the right. Is that an alignment problem?"
          a: "Pulling to one side can be caused by alignment, but it can also be caused by uneven tire pressure, a sticking brake caliper, or a worn tire. We check all factors before recommending alignment."
        - q: "Does alignment affect tire life?"
          a: "Yes. Misaligned toe angles especially will cause rapid tire wear on the inner or outer edge of the tread. A proper alignment is one of the most cost-effective things you can do to extend tire life."
        - q: "Can you align all-wheel-drive vehicles?"
          a: "Yes. We perform four-wheel alignments on front-wheel-drive, rear-wheel-drive, and all-wheel-drive vehicles."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441 from downtown. Turn right on David Walker Dr in Eustis."

    - slug: adas-calibration
      name: "ADAS Calibration"
      hero_sub: "ADAS camera and sensor calibration for Mount Dora vehicles after windshield replacement, suspension work, or collision repair."
      body: |
        <h2>ADAS Calibration Near Mount Dora, FL</h2>
        <p>Advanced driver assistance systems rely on cameras and sensors that must be precisely aimed to work correctly. After a windshield replacement, a wheel alignment, a suspension repair, or any collision repair that shifts body panels, ADAS components must be recalibrated. RJ Fox Automotive performs ADAS calibration for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>Forward-facing cameras for lane departure warning, automatic emergency braking, and adaptive cruise control are mounted to the windshield or behind it. A new windshield installation changes the camera's angle relative to the road. An uncalibrated camera can misdetect lane markings, trigger false warnings, or fail to detect hazards in time.</p>
        <p>We see vehicles from the Mount Dora area where ADAS warning lights came on after a windshield replacement or alignment and the shop that did the work did not offer calibration. We recalibrate the affected systems and verify function before the vehicle leaves.</p>
        <h2>Systems We Calibrate</h2>
        <p>Forward collision warning and automatic emergency braking cameras, lane departure warning cameras, adaptive cruise control radar, blind spot monitoring sensors, rear cross-traffic alert sensors, and surround-view camera systems. Calibration procedures vary by manufacturer and may be static, dynamic, or both.</p>
      faq:
        - q: "Does every windshield replacement require ADAS calibration?"
          a: "If the vehicle has a camera mounted to the windshield or behind it, yes. Most vehicles built after 2018 have forward-facing cameras that require calibration after windshield replacement."
        - q: "My lane departure warning light came on after an alignment. Is that normal?"
          a: "Yes. A wheel alignment changes the vehicle's geometry, which shifts the camera's reference angle. The camera needs to be recalibrated to the new geometry."
        - q: "Can I drive the car if ADAS systems are uncalibrated?"
          a: "You can drive it, but the ADAS features may not work correctly. Automatic emergency braking, lane departure warning, and adaptive cruise control may trigger false alerts, fail to trigger when needed, or be completely disabled."
        - q: "How long does ADAS calibration take?"
          a: "Static calibration takes one to two hours in most cases. Dynamic calibration requires a road drive under specific conditions and may take longer depending on the vehicle."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441. Turn right on David Walker Dr in Eustis."

