      body: |
        <h2>AC Repair Near Mount Dora, FL</h2>
        <p>Central Florida heat is relentless, and a failing AC system makes every drive uncomfortable. RJ Fox Automotive diagnoses and repairs the full AC system for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>Mount Dora summers are no different from the rest of Lake County when it comes to heat and humidity. Whether you are driving through the Historic District, heading to Lake Dora, or commuting down US-441, a functional AC system is not a luxury. We take AC problems seriously and we fix them properly rather than just recharging a leaking system and sending you on your way.</p>
        <p>Every AC diagnosis at our shop includes a full system inspection before we recommend any repair. We check refrigerant level and pressure, inspect the compressor, condenser, evaporator, expansion valve, and all hoses and fittings for leaks. We identify exactly what has failed and why before writing an estimate.</p>
        <h2>What We Repair</h2>
        <p>Compressor replacement, condenser replacement, evaporator service, expansion valve replacement, refrigerant leak repair, blend door actuator replacement, and full AC system recharging to manufacturer specification. After every AC repair, we verify vent temperatures before the vehicle leaves the shop.</p>
      faq:
        - q: "My AC blows warm air. What could cause that?"
          a: "Warm air from a functioning blower can be caused by low refrigerant from a leak, a failed compressor, a clogged condenser, a faulty expansion valve, or electrical issues in the control system. Diagnosis identifies which one."
        - q: "Can you just recharge my AC?"
          a: "We recharge AC systems, but we do not recharge a system that has a leak without finding and repairing the leak first. Recharging a leaking system is a temporary fix that puts refrigerant into the atmosphere and leaves you with the same problem in a few months."
        - q: "How long does AC repair take?"
          a: "It depends on the repair. A recharge with no leaks takes about an hour. Compressor replacement typically takes a full day. We give you a time estimate with the repair quote."
        - q: "Do you work on all vehicle makes?"
          a: "Yes. Domestic, Asian, and European vehicles of all makes and model years."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441 from downtown Mount Dora. Turn right on David Walker Dr in Eustis."

    - slug: auto-ac-recharge
      name: "AC Recharge"
      hero_sub: "AC refrigerant recharge for Mount Dora vehicles. Proper recovery and recharge to manufacturer specification, with leak check before refilling."
      body: |
        <h2>AC Recharge Near Mount Dora, FL</h2>
        <p>If your AC is not blowing as cold as it used to, low refrigerant is one possible cause. RJ Fox Automotive performs AC recharges at our Eustis shop, about ten minutes from Mount Dora via US-441 South. We do not just top off the refrigerant and send you on your way. We check for leaks first.</p>
        <p>Refrigerant does not wear out or get consumed. If your system is low, it leaked out somewhere. Recharging without finding and fixing the leak means you will be back in a few months with the same problem, plus refrigerant was vented into the environment in the meantime. We locate the source of the leak before we recommend a recharge.</p>
        <p>If the system has no leaks and is just slightly low, or if the leak was a minor seal that has been repaired, we recover the remaining refrigerant, evacuate the system, and recharge to the manufacturer-specified weight using the correct refrigerant type for your vehicle. We verify vent temperatures after recharging to confirm the system is working correctly.</p>
      faq:
        - q: "Why do you check for leaks before recharging?"
          a: "Refrigerant does not get used up. If the level is low, it leaked out. Recharging without fixing the leak wastes money and does not solve the problem. We find the leak first."
        - q: "How long does an AC recharge take?"
          a: "If there are no leaks and the system just needs to be recharged, the process takes about an hour including the leak check, evacuation, and recharge."
        - q: "What type of refrigerant do you use?"
          a: "We use the refrigerant specified for your vehicle. R-134a is standard on vehicles through the mid-2010s. Newer vehicles use R-1234yf. We use the correct type for your car."
        - q: "Will a recharge fix my AC completely?"
          a: "If low refrigerant is the only issue, yes. If there are other problems such as a failing compressor or a stuck expansion valve, a recharge alone will not fix them. Our diagnosis identifies everything that needs attention."
        - q: "How do I get to your shop from Mount Dora?"
          a: "Take US-441 South from downtown Mount Dora. Turn right on David Walker Dr in Eustis. About ten minutes."

    - slug: auto-ac-replacement
