    - slug: battery-testing-replacement
      name: "Battery Service"
      hero_sub: "Battery testing and replacement for Leesburg vehicles. Full charging system check with every service."
      body: |
        <h2>Battery Service Near Leesburg, FL</h2>
        <p>Leesburg summers are tough on vehicle batteries, and Florida heat significantly shortens battery life compared to cooler climates. RJ Fox Automotive performs battery testing and replacement for all makes and models at our Eustis shop, about fifteen minutes from downtown Leesburg via US-441 South.</p>
        <p>Most batteries in central Florida last three to five years before heat degradation causes them to fail unexpectedly. If your battery is in that age range and you have noticed any slow cranking or hesitation when starting, a load test is the only way to know whether the battery is about to fail.</p>
        <p>We load-test the battery, test alternator output and voltage regulator function, and inspect battery cables and terminals at every battery service. A corroded battery terminal or a failing alternator can cause a battery to fail prematurely or to drain overnight, and those problems need to be addressed along with the battery replacement.</p>
      faq:
        - q: "Why does my battery keep dying overnight?"
          a: "A battery that drains overnight has a parasitic draw somewhere in the system. Something is pulling current when the vehicle is off. We measure parasitic draw and trace it to the specific circuit or module causing it."
        - q: "Do you test the battery before recommending replacement?"
          a: "Always. We load-test the battery before recommending replacement. A battery that passes a load test does not need to be replaced."
        - q: "What causes battery terminals to corrode?"
          a: "Corrosion on battery terminals is caused by outgassing from the battery and exposure to moisture and heat. It increases resistance in the charging and starting circuits. We clean or replace corroded terminals and cables."
        - q: "How much does a battery replacement cost?"
          a: "It varies by vehicle and battery specification. We quote the specific battery your vehicle requires when you call or come in."
