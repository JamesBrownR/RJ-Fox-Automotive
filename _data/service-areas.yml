      body: |
        <h2>Engine Repair Near Mount Dora, FL</h2>
        <p>Engine problems do not get cheaper with time, and Mount Dora drivers who catch issues early almost always come out ahead. RJ Fox Automotive handles major engine repair at our Eustis facility, about ten minutes south of Mount Dora on US-441. We work on all makes and models, from the daily commuters that run the US-441 corridor to the older vehicles that come through Renninger's Antique Center.</p>
        <p>Common engine repairs we handle include head gasket replacement, timing belt and chain service, valve cover gasket and oil leak repair, water pump replacement, intake manifold gaskets, and overheating diagnosis and repair. We also handle engine mounts, PCV system service, and carbon cleaning on direct-injection engines that develop buildup over time.</p>
        <p>Every engine repair starts with an accurate diagnosis. We do not recommend parts by guesswork. We scan all fault codes, perform compression tests and leak-down tests where appropriate, and do the hands-on inspection needed to identify the actual cause before writing an estimate.</p>
        <h2>Overheating Is an Emergency</h2>
        <p>If your temperature gauge is climbing, your heater is blowing cold, or you see steam from under the hood, pull over. Continuing to drive an overheating engine is the fastest way to turn a repairable head gasket problem into a destroyed engine. Call us and we will help you figure out the safest way to get the vehicle to our shop.</p>
      faq:
        - q: "How do I know if I have a head gasket problem?"
          a: "Common signs include white smoke from the exhaust on a warm engine, coolant loss with no visible leak, milky residue on the oil cap, repeated overheating, or bubbles in the coolant reservoir. If you see any of these, bring it in before driving further."
        - q: "Do you perform timing belt replacements?"
          a: "Yes. Timing belt service is one of the most critical maintenance items on interference engines. If the belt breaks, the engine can be severely damaged. We follow manufacturer intervals and replace the water pump and tensioners at the same time."
        - q: "Can you fix oil leaks?"
          a: "Yes. We diagnose the source of oil leaks and repair them properly rather than recommending that you just keep adding oil. Common sources include valve cover gaskets, rear main seals, oil pan gaskets, and front timing cover seals."
        - q: "Do you work on older vehicles?"
          a: "Yes. We see a fair number of older and collector vehicles from the Mount Dora area and we work on them the same way we work on late-model vehicles. Honest diagnosis, straight estimate, quality parts."
        - q: "How far are you from Mount Dora?"
          a: "About ten minutes south on US-441 from the Historic District. Turn right on David Walker Dr in Eustis and we are on the right."

    - slug: engine-rebuild
      name: "Engine Rebuild"
      hero_sub: "Complete engine rebuilds for Mount Dora vehicles when repair is no longer the right path. In-house machine work and assembly."
      body: |
        <h2>Engine Rebuild Near Mount Dora, FL</h2>
        <p>When an engine has reached the end of its repairable life, a rebuild brings it back to manufacturer specification. RJ Fox Automotive performs complete engine rebuilds at our Eustis shop, about ten minutes from Mount Dora via US-441 South. We handle the full process in-house, from teardown and inspection to machining, assembly, and break-in.</p>
        <p>Engine rebuilds make the most sense when the vehicle is worth keeping, the engine block and heads are in salvageable condition, and the cost of a rebuild is less than a replacement engine or a new vehicle. Older trucks, collector vehicles, diesel engines, and vehicles with low overall mileage except for internal wear are common candidates for a rebuild rather than replacement.</p>
        <h2>What a Rebuild Includes</h2>
        <p>A complete engine rebuild involves full disassembly, cleaning, and measurement of all internal components. Cylinders are bored or honed, pistons and rings are replaced, crankshaft and camshaft journals are measured and machined if needed, bearings are replaced throughout, and all seals and gaskets are renewed. The result is an engine that performs and seals like new. We document the specifications measured and the work performed so you have a complete record.</p>
      faq:
        - q: "When does a rebuild make more sense than an engine replacement?"
          a: "When the block and heads are in good condition and the failure is due to wear rather than catastrophic damage, a rebuild is often the better value. For engines with significant block damage, a replacement unit may be more practical. We assess both options and give you honest pricing on each."
        - q: "How long does an engine rebuild take?"
          a: "A full rebuild typically takes one to two weeks depending on parts availability and the extent of machine work required. We give you a realistic timeline at the start of the job."
        - q: "Is a rebuilt engine as good as a new one?"
          a: "A properly executed rebuild restores the engine to manufacturer specification. The quality depends entirely on the parts used and the precision of the machine work. We do not take shortcuts."
        - q: "Do you rebuild diesel engines?"
          a: "Yes. We rebuild gasoline and diesel engines including Power Stroke, Duramax, and Cummins units."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441. Turn right on David Walker Dr in Eustis and we are on the right side of the road."

    - slug: auto-engine-diagnostic
      name: "Engine Diagnostics"
      hero_sub: "Advanced engine diagnostics for Mount Dora vehicles. We find the actual cause before recommending any repair."
      body: |
        <h2>Engine Diagnostics Near Mount Dora, FL</h2>
        <p>A check engine light or an engine symptom you cannot quite describe is not enough information to start replacing parts. Engine diagnostics is the process of identifying the actual root cause of a problem before any repair work begins. RJ Fox Automotive uses professional-grade diagnostic equipment at our Eustis shop, about ten minutes from Mount Dora via US-441 South.</p>
        <p>We scan all fault codes across every module, review freeze frame data, and perform the hands-on testing needed to confirm the root cause. Fault codes point toward a system that has a problem. Identifying the specific component that caused the code requires additional testing and experience. We do not stop at pulling codes and recommending the parts those codes suggest.</p>
        <p>Mount Dora drivers sometimes arrive after another shop gave them a list of parts to replace that did not fix the problem. We start fresh with a full diagnosis and give you a clear picture of what is actually wrong and what it will cost to fix.</p>
        <h2>What We Test</h2>
        <p>Beyond code retrieval, we perform live data analysis to watch sensors and actuators in real time, compression testing, fuel pressure and injector testing, ignition system testing, vacuum leak detection, and cooling system pressure tests. We use the test results to confirm the diagnosis before the estimate is written.</p>
      faq:
        - q: "Can you tell what's wrong just from the code?"
          a: "The code tells us which system triggered a fault. It does not identify the specific component. A P0300 random misfire code, for example, could be caused by spark plugs, ignition coils, injectors, compression loss, or vacuum leaks. We test to find the actual cause."
        - q: "Another shop gave me a list of parts. Can you verify their diagnosis?"
          a: "Yes. We perform our own independent diagnosis and give you our assessment. If the other shop was correct, we will confirm it. If not, we will tell you what we actually found."
        - q: "How much does a diagnostic cost?"
          a: "We charge a diagnostic fee which is applied toward the repair if you have the work done with us. We quote the fee upfront before starting."
        - q: "How long does a diagnostic take?"
          a: "Basic diagnostics for a check engine light take about an hour. More complex symptoms involving multiple systems or intermittent problems can take longer. We give you a time estimate when you drop off."
        - q: "How far are you from Mount Dora?"
          a: "About ten minutes south on US-441 from the Historic District. Turn right on David Walker Dr in Eustis."

