      hero_sub: "AC refrigerant recharge for Mount Dora vehicles. Leak check before refilling. Manufacturer-specified refrigerant."
      body: |
        <h2>Auto AC Recharge Near Mount Dora, FL</h2>
        <p>If your AC is not blowing as cold as it used to, low refrigerant is one possible cause. RJ Fox Automotive performs AC recharges at our Eustis shop, about ten minutes from Mount Dora via US-441 South. We check for leaks before refilling.</p>
        <p>Refrigerant does not wear out or get consumed. If your system is low, it leaked out somewhere. We locate the source of the leak first, repair it, and then recharge to the manufacturer-specified amount. We verify vent temperatures after recharging to confirm the system is working correctly.</p>
      faq:
        - q: "Why do you check for leaks before recharging?"
          a: "Because refrigerant does not get used up. Low refrigerant means a leak. Recharging without fixing the leak wastes money and repeats the problem."
        - q: "How long does an AC recharge take?"
          a: "About an hour if there are no leaks and the system just needs to be recharged."
        - q: "What type of refrigerant do you use?"
          a: "We use the refrigerant specified for your vehicle. R-134a is standard on most vehicles through the mid-2010s. Newer vehicles use R-1234yf."
        - q: "Will a recharge fix my AC completely?"
          a: "If low refrigerant is the only issue, yes. If there are other problems such as a failing compressor, a recharge alone will not fix them."
        - q: "How do I get to your shop from Mount Dora?"
          a: "Take US-441 South from downtown Mount Dora. Turn right on David Walker Dr in Eustis. About ten minutes."

