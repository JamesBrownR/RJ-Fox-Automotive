        - q: "Can I tell by looking at the fluid whether it needs to be changed?"
          a: "Yes. Healthy transmission fluid is red or slightly pink and nearly clear. Dark brown or black fluid with a burnt smell has exceeded its service life. Fluid with a milky appearance indicates coolant contamination, which requires immediate attention."
        - q: "Is it worth servicing the transmission on an older high-mileage vehicle?"
          a: "Generally yes, especially if the transmission is currently functioning normally. Regular service keeps it running longer. We assess the overall condition and give you an honest opinion."
