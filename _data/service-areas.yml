      body: |
        <h2>Exhaust System Repair Near Mount Dora, FL</h2>
        <p>A failing exhaust system is loud, reduces fuel efficiency, and in some cases allows exhaust gases to enter the cabin. RJ Fox Automotive handles exhaust system repairs for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>We see exhaust problems across a range of vehicles from the Mount Dora area, from older trucks with rusted-through pipes to late-model vehicles with catalytic converter efficiency faults triggering check engine lights. Whatever the cause, we diagnose the full exhaust system and repair only what needs repairing.</p>
        <h2>What We Repair</h2>
        <p>Muffler replacement, exhaust pipe repair and replacement, catalytic converter diagnosis and replacement, oxygen sensor replacement, exhaust manifold repair, flex pipe replacement, and hangers and gaskets. We also diagnose exhaust-related check engine lights including P0420 and P0430 catalytic converter efficiency codes.</p>
      faq:
        - q: "My car is louder than usual. Is that an exhaust problem?"
          a: "Increased exhaust noise usually means a hole or separation in the exhaust pipe, a failed muffler, or a cracked exhaust manifold. We inspect the full system and identify the specific failure point."
        - q: "Can a bad catalytic converter cause a check engine light?"
          a: "Yes. P0420 and P0430 codes indicate catalytic converter efficiency below threshold. These codes can be caused by a failing converter but can also be caused by oxygen sensor problems or exhaust leaks upstream of the converter. We diagnose the root cause before recommending converter replacement."
        - q: "Is it safe to drive with an exhaust leak?"
          a: "An exhaust leak upstream of the passenger compartment can allow carbon monoxide to enter the cabin. This is a safety hazard. If you smell exhaust inside the vehicle, have it inspected promptly."
        - q: "Do you weld exhaust repairs or use clamps?"
          a: "We use the appropriate repair method for the situation. Some repairs are better welded for longevity. Others are appropriate for clamp or sleeve repairs. We do what makes sense for the specific failure."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441. Turn right on David Walker Dr in Eustis."

    - slug: engine-diagnostics
      name: "Engine Diagnostics"
      hero_sub: "Compression testing, live data analysis, and advanced engine diagnostics for Mount Dora vehicles. We find the problem before we recommend a repair."
      body: |
        <h2>Engine Diagnostics Near Mount Dora, FL</h2>
        <p>Engine diagnostics goes beyond reading fault codes. RJ Fox Automotive uses professional scan tools, compression testers, fuel pressure gauges, and hands-on inspection techniques to identify the specific cause of engine problems at our Eustis shop, about ten minutes from Mount Dora via US-441 South.</p>
        <p>We perform compression testing on engines showing signs of internal wear, leak-down testing to identify valve, ring, or head gasket failures, fuel pressure testing for hard-start and stalling conditions, and ignition system testing for misfires. We do not guess and recommend parts. We test and confirm before writing an estimate.</p>
        <p>Mount Dora drivers who have been told their engine needs expensive repairs elsewhere often find it worth making the short drive to get a second opinion from us. We start fresh with our own diagnosis and give you our honest assessment.</p>
      faq:
        - q: "What does a compression test tell you?"
          a: "Compression testing measures the pressure developed in each cylinder during the compression stroke. Low compression in one or more cylinders indicates worn rings, a leaking valve, or a head gasket problem. It is a key test for diagnosing engine internal problems."
        - q: "What is a leak-down test?"
          a: "A leak-down test pressurizes a cylinder with compressed air and measures how quickly pressure escapes. By listening where the air goes, we can identify whether the leak is past the rings into the crankcase, past the intake valve, past the exhaust valve, or into the cooling system."
        - q: "My engine misfires randomly. How do you diagnose that?"
          a: "Random misfires can be caused by ignition components, fuel delivery issues, vacuum leaks, or internal engine problems. We test each system systematically to isolate the cause."
        - q: "How much does engine diagnostics cost?"
          a: "We charge a diagnostic fee that is applied toward the repair if you have the work done with us. We quote the fee before starting."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441 from the Historic District. Turn right on David Walker Dr in Eustis."

    - slug: air-conditioning
      name: "Air Conditioning Service"
      hero_sub: "Complete air conditioning service for Mount Dora vehicles. Compressor, condenser, evaporator, refrigerant, and full system checks."
      body: |
        <h2>Air Conditioning Service Near Mount Dora, FL</h2>
        <p>Mount Dora summers demand a fully functioning air conditioning system. RJ Fox Automotive performs complete air conditioning service for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>We approach AC service the same way we approach every repair: diagnose the full system before recommending any work. We check refrigerant pressure and charge level, test compressor operation, inspect the condenser for damage or debris blockage, check the evaporator and expansion valve, and verify the electrical system including the AC clutch relay and pressure switches. Every component gets checked before we write an estimate.</p>
        <p>After every AC service, we verify vent temperatures to confirm the system is performing within specification. We do not consider the job done until the air coming from your vents is actually cold.</p>
        <h2>Seasonal AC Service</h2>
        <p>Before the heat of summer arrives is the best time to have your AC system inspected. An AC system that is slightly low on refrigerant or has a small leak will struggle when ambient temperatures reach the 90s. Catching problems in spring means you are not waiting in a repair queue in July when every AC shop in Lake County is backed up.</p>
      faq:
        - q: "My AC works sometimes but not others. What could cause that?"
          a: "Intermittent AC is often caused by a failing AC clutch relay, a pressure switch cutting out due to a marginally low refrigerant charge, or an electrical connection that is temperature-sensitive. We diagnose the specific cause."
        - q: "Why does my AC smell musty when it first turns on?"
          a: "Musty odor is usually mold or bacteria growing on the evaporator core inside the dash. This is common in Florida's humidity. It can be treated with an evaporator cleaner or in severe cases requires evaporator replacement."
        - q: "How cold should my AC vents be?"
          a: "On a warm Florida day with the system working correctly, vent temperatures of 38 to 48 degrees Fahrenheit are typical. Anything above 50 to 55 degrees indicates the system is not performing correctly."
        - q: "Do you service AC on diesel trucks?"
          a: "Yes. We service AC systems on diesel and gasoline vehicles of all makes and models."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441. Turn right on David Walker Dr in Eustis."
