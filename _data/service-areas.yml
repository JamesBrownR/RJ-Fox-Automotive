    - slug: diesel-engines
      name: "Diesel Engine Repair"
      hero_sub: "Diesel engine repair for Leesburg trucks. Power Stroke, Duramax, and Cummins service done in-house."
      body: |
        <h2>Diesel Engine Repair Near Leesburg, FL</h2>
        <p>Leesburg has one of the strongest diesel truck populations in Lake County, with working trucks hauling equipment, boats, and trailers around Lake Harris and the surrounding area alongside retired drivers who have put serious miles on their diesel pickups. RJ Fox Automotive handles diesel engine repair entirely in-house at our Eustis shop, about fifteen minutes from Leesburg on US-441 South.</p>
        <p>We service Ford Power Stroke, GM Duramax, and Ram Cummins diesel engines regularly. We also service diesel-powered imports and light trucks. Diesel problems we see most commonly from Leesburg-area vehicles include injector wear on high-mileage trucks, EGR and DPF issues on trucks driven in mixed duty cycles, turbocharger wear on trucks used for heavy towing, and glow plug failures on trucks that sit during the winter months when snowbird vehicles return north.</p>
        <h2>Diesel Services</h2>
        <p>Diesel fuel system diagnosis, injector testing and replacement, glow plug replacement, turbocharger inspection and repair, EGR valve and cooler service, DPF cleaning and replacement, diesel-spec oil and filter service, coolant system service, and complete diesel diagnostics.</p>
      faq:
        - q: "My diesel truck is hard to start in the morning even though it is warm outside. What could cause that?"
          a: "Hard starting in warm weather on a diesel can indicate failing injectors, low compression, a malfunctioning fuel shutoff solenoid, or fuel supply issues. Glow plug failure is more common in cold weather but can still affect warm-weather starts on some engines."
        - q: "How do I know if my DPF is clogged?"
          a: "A clogged DPF causes power loss, reduced fuel economy, and often triggers a check engine light with DPF-related fault codes. The truck may also go into a forced regeneration cycle more frequently than normal."
        - q: "Do you service the 6.0 Power Stroke?"
          a: "Yes. The 6.0 has well-known issues with the EGR cooler and oil cooler. We diagnose and repair these specifically along with all other Power Stroke service."
        - q: "How often should diesel engine oil be changed?"
          a: "Most manufacturer recommendations for diesel trucks fall between 5,000 and 7,500 miles with diesel-spec full synthetic oil. Trucks used for heavy towing or extreme duty benefit from more frequent changes."
        - q: "How far is your shop from Leesburg?"
          a: "About fifteen minutes south on US-441 from downtown Leesburg."

    - slug: auto-brake-repair
      name: "Brake Repair"
      hero_sub: "Brake repair for Leesburg vehicles and trucks. Full system inspection, pads, rotors, calipers, and ABS service."
      body: |
        <h2>Brake Repair Near Leesburg, FL</h2>
        <p>Leesburg drivers with trucks, SUVs, and vehicles used for towing put significant demand on brake systems. RJ Fox Automotive performs full brake system repair for all makes and models at our Eustis shop, about fifteen minutes from Leesburg on US-441 South.</p>
        <p>We inspect the complete brake system and replace only what needs replacing. Both axles, calipers, hydraulic system, and brake fluid condition. Trucks used for towing around Lake Harris and the surrounding area wear brake components differently than commuter vehicles, and we assess based on actual condition and your use case rather than applying a generic mileage recommendation.</p>
        <h2>Brake Services</h2>
        <p>Brake pad replacement, rotor resurfacing and replacement, caliper service and replacement, brake hose replacement, master cylinder service, brake fluid flush, ABS module and wheel speed sensor service, and parking brake adjustment. We diagnose brake noise, pedal pulsation, pulling, and soft pedal concerns.</p>
      faq:
        - q: "My brakes feel spongy. What could cause that?"
          a: "A spongy brake pedal is usually caused by air in the hydraulic system, a failing master cylinder, or a brake hose that is collapsing internally under pressure. We identify the specific cause."
        - q: "How often should I flush my brake fluid?"
          a: "Every two to three years regardless of mileage. Brake fluid absorbs moisture over time, which lowers its boiling point and promotes internal corrosion."
        - q: "Do you service brakes on diesel trucks?"
          a: "Yes. Heavy-duty trucks have larger rotors and calipers but the service procedure and principles are the same. We work on brakes across all vehicle sizes."
        - q: "Can warped rotors be resurfaced or do they need to be replaced?"
          a: "It depends on remaining rotor thickness. If the rotor is above minimum thickness specification after resurfacing, it can be reused. If it is at or below minimum, it should be replaced. We measure and tell you."
        - q: "How far is your shop from Leesburg?"
          a: "About fifteen minutes south on US-441. Turn right on David Walker Dr in Eustis."

    - slug: steering-suspension-repair
      name: "Steering and Suspension Repair"
      hero_sub: "Steering and suspension repair for Leesburg vehicles. Shocks, struts, tie rods, ball joints, and full suspension service."
      body: |
        <h2>Steering and Suspension Repair Near Leesburg, FL</h2>
        <p>Suspension components on Leesburg-area vehicles take wear from county roads, lakefront driving, and the general mileage that comes with central Florida living. RJ Fox Automotive handles steering and suspension repairs for all makes and models at our Eustis shop, about fifteen minutes from Leesburg on US-441 South.</p>
        <p>High-mileage trucks and SUVs common in the Leesburg area are frequent candidates for suspension work. Worn ball joints, failing tie rod ends, and degraded control arm bushings develop gradually and affect how the vehicle handles and how tires wear. By the time the change is noticeable, the wear is usually significant.</p>
        <p>We inspect the complete steering and suspension system, tell you exactly what we find, and replace only what needs replacing. After any repair that changes wheel geometry, we perform a four-wheel alignment to bring the vehicle back to specification.</p>
      faq:
        - q: "How do I know if my ball joints need to be replaced?"
          a: "We check ball joint play with the vehicle on a lift. Excessive movement in a ball joint that should have no play indicates replacement is needed. Some ball joints are greaseable. Others are sealed and show wear differently."
        - q: "What causes a vehicle to wander on the highway?"
          a: "Highway wander can come from worn tie rod ends, loose steering rack bushings, worn wheel bearings, or improperly inflated tires. We inspect the full steering system to identify the cause."
        - q: "Do shocks and struts need to be replaced in pairs?"
          a: "Yes. Replacing one shock or strut without the other on the same axle creates an imbalance in handling and braking. We replace axle pairs."
        - q: "Do you work on trucks with leveling kits or minor lifts?"
          a: "Yes. We work on trucks with factory suspension and those with mild lift kits. Extreme lifts may require specialty equipment we can discuss with you."
        - q: "How far is your shop from Leesburg?"
          a: "About fifteen minutes south on US-441 from downtown Leesburg."

    - slug: wheel-alignment
      name: "Wheel Alignment"
      hero_sub: "Four-wheel alignment for Leesburg vehicles. Correct pulling, uneven tire wear, and off-center steering."
      body: |
        <h2>Wheel Alignment Near Leesburg, FL</h2>
        <p>Wheel alignment is one of the most cost-effective maintenance services available, and it is often skipped until tire wear becomes obvious. RJ Fox Automotive performs precision four-wheel alignments for all makes and models at our Eustis shop, about fifteen minutes from Leesburg on US-441 South.</p>
        <p>Leesburg roads and the county routes around Lake Harris expose vehicles to the kinds of impacts and gradual wear that pull alignment out of specification. A vehicle that pulls slightly to the right, a steering wheel that sits slightly off-center on a straight road, or tires wearing faster than expected on the inner or outer edges are all signs that alignment needs to be checked.</p>
        <p>We measure all four wheels simultaneously, compare to manufacturer specifications, and make adjustments where they are adjustable. We provide before-and-after measurements with every alignment.</p>
      faq:
        - q: "Can misalignment cause tire blowouts?"
          a: "Extreme misalignment can cause uneven tire wear severe enough to create a structural weakness in the tire that leads to blowout. More commonly it just causes expensive premature wear. Neither outcome is worth the cost of skipping an alignment."
        - q: "My truck drifts after I hit a bump. Is that alignment?"
          a: "Drift after bumps can indicate worn tie rod ends or loose steering rack mounting rather than just an alignment issue. We inspect suspension components before aligning to make sure the geometry is solid."
        - q: "How long does an alignment take?"
          a: "A standard four-wheel alignment takes about an hour. Vehicles with worn steering or suspension components that need repair first take longer."
        - q: "Do you align diesel trucks and large SUVs?"
          a: "Yes. We align all vehicle sizes including full-size trucks and SUVs."
        - q: "How far is your shop from Leesburg?"
          a: "About fifteen minutes south on US-441 from downtown Leesburg."

    - slug: adas-calibration
      name: "ADAS Calibration"
      hero_sub: "ADAS camera and sensor calibration for Leesburg vehicles. Required after windshield replacement, alignment, and suspension work."
      body: |
        <h2>ADAS Calibration Near Leesburg, FL</h2>
        <p>Advanced driver assistance systems must be recalibrated any time the vehicle's geometry or glass is changed. RJ Fox Automotive performs ADAS calibration for all makes and models at our Eustis shop, about fifteen minutes from Leesburg on US-441 South.</p>
        <p>Windshield replacement, wheel alignment, suspension repairs that change ride height, and collision repairs that affect body panel alignment can all require ADAS recalibration. Vehicles with forward-facing cameras, blind spot monitoring, rear cross-traffic alert, and adaptive cruise control radar are all potentially affected depending on what work was performed.</p>
        <p>Leesburg drivers who have had any of these services recently and have ADAS warning lights on the dash, or who have noticed their lane departure or automatic braking systems behaving erratically, should have the systems calibrated.</p>
      faq:
        - q: "My automatic emergency braking keeps triggering when nothing is there. Could that be a calibration issue?"
          a: "Yes. A misaligned forward camera or radar unit can cause the system to detect objects that are not there or to trigger at inappropriate distances. Calibration resolves this."
        - q: "Do all windshield replacements require calibration?"
          a: "All vehicles with a forward-facing camera mounted to or behind the windshield require calibration after windshield replacement."
        - q: "How do you calibrate ADAS systems?"
          a: "Calibration procedures vary by manufacturer. Static calibration uses targets placed at specific distances and positions in front of the vehicle. Dynamic calibration involves driving the vehicle under specified conditions. Some vehicles require both."
        - q: "What happens if I drive with an uncalibrated ADAS system?"
          a: "The affected systems may not work correctly, may produce false warnings, or may be completely disabled. In some cases an uncalibrated system that takes automated action such as emergency braking could do so at the wrong time."
        - q: "How far is your shop from Leesburg?"
          a: "About fifteen minutes south on US-441 from downtown Leesburg."

    - slug: general-repairs-maintenance
