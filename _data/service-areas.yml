    - slug: auto-brake-repair
      name: "Brake Repair"
      hero_sub: "Brake repair for Tavares vehicles. Pads, rotors, calipers, ABS diagnosis, and full brake system service."
      body: |
        <h2>Brake Repair Near Tavares, FL</h2>
        <p>Brakes are the most safety-critical system on any vehicle, and Tavares drivers who hear squealing, feel pulsation through the pedal, or notice the vehicle pulling when braking should not delay. RJ Fox Automotive performs full brake system repair for all makes and models at our Eustis shop, about ten minutes from Tavares on US-441 or SR-19 South.</p>
        <p>We inspect the complete brake system before making any recommendation. Both axles, the hydraulic system, brake fluid condition, and ABS components. We tell you what needs replacing, what can continue in service, and what to watch over the coming months. You pay for what your vehicle actually needs.</p>
        <h2>Brake Services</h2>
        <p>Brake pad replacement, rotor resurfacing and replacement, caliper replacement, brake hose service, master cylinder and wheel cylinder repair, brake fluid flush, ABS system diagnosis, and parking brake adjustment. We diagnose pedal feel concerns, pulsation, noise, and pulling during braking.</p>
      faq:
        - q: "How often should brakes be inspected?"
          a: "Every 12,000 miles or once a year is a reasonable inspection interval. Brakes wear at different rates depending on driving habits and conditions. Stop-and-go driving through downtown Tavares wears brakes faster than highway use."
        - q: "My brakes squeal but only when cold. Is that normal?"
          a: "Some light squealing when brakes are cold and have surface rust from overnight moisture is normal and usually goes away after the first few stops. Squealing that continues once the brakes are warm indicates worn pads."
        - q: "What causes brake pedal pulsation?"
          a: "Pulsation through the pedal when braking usually indicates warped rotors. It can also come from uneven pad deposits on the rotor surface caused by improper bedding or brake drag."
        - q: "Do you service ABS systems?"
          a: "Yes. ABS warning lights, ABS module faults, and wheel speed sensor replacements are all services we perform."
        - q: "How far is your shop from Tavares?"
          a: "About ten minutes from downtown Tavares on US-441 or SR-19 South toward Eustis."

    - slug: steering-suspension-repair
