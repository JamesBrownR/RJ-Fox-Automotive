        <h2>Steering and Suspension Repair Near Mount Dora, FL</h2>
        <p>RJ Fox Automotive handles steering and suspension repairs for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>We repair shocks and struts, tie rod ends and inner tie rods, ball joints, control arms and bushings, sway bar end links and bushings, power steering pumps and racks, electric power steering systems, and wheel bearings. After any steering or suspension repair that affects wheel position, we perform a wheel alignment.</p>
      faq:
        - q: "My steering wheel vibrates at highway speed. What could cause that?"
          a: "Vibration at highway speed is most often related to tire balance or a bent wheel, but it can also indicate worn tie rod ends, loose wheel bearings, or worn strut mounts."
        - q: "How do I know if my shocks or struts are worn?"
          a: "Signs include excessive body roll in turns, nose dive when braking, bouncing after bumps that takes more than one cycle to settle, and uneven tire wear."
        - q: "Can I drive with a worn tie rod?"
          a: "A worn tie rod is a safety concern. A failed tie rod means loss of steering control. Do not delay the repair."
        - q: "Do you do wheel alignments after suspension work?"
          a: "Yes. Any suspension or steering repair that changes wheel geometry requires a wheel alignment."
