        <p>Refrigerant does not deplete on its own. If the level is low, it leaked out somewhere. Recharging without repairing the leak is a temporary fix. We locate the source of the leak first, repair it, and then recharge to the manufacturer-specified amount using the correct refrigerant type for your vehicle. After recharging we verify vent temperatures to confirm the system is working.</p>
        <p>Tavares-area vehicles that have had their AC recharged at a quick-lube or parts store without a leak check often come to us when the AC stops working again six months later. We do it right the first time.</p>
      faq:
        - q: "Why do you check for leaks before recharging?"
          a: "Because refrigerant does not get used up. Low refrigerant means a leak. Recharging without fixing the leak wastes money and repeats the problem."
        - q: "Can you recharge AC on older vehicles with R-12 refrigerant?"
          a: "R-12 is no longer produced. Older vehicles can be retrofitted to use R-134a or the newer R-1234yf. We can discuss retrofit options if your vehicle is old enough to have used R-12."
        - q: "How do I know what refrigerant my car uses?"
          a: "It is on a sticker under the hood near the AC components, or we can look it up by your vehicle's year, make, and model."
        - q: "How long does a recharge take?"
          a: "About an hour if there are no leaks and the system just needs to be recharged."
        - q: "How far is your shop from Tavares?"
          a: "About ten minutes south on US-441 or SR-19. Turn onto David Walker Dr in Eustis."

    - slug: auto-ac-replacement
      name: "AC Replacement"
      hero_sub: "AC component replacement for Tavares vehicles. Compressor, condenser, evaporator, and full system rebuilds."
      body: |
        <h2>AC Replacement Near Tavares, FL</h2>
        <p>When an AC component has failed beyond repair, replacement is the correct solution. RJ Fox Automotive performs complete AC component replacements for all makes and models at our Eustis shop, about ten minutes from Tavares on US-441 or SR-19 South.</p>
        <p>Florida's heat makes a fully functioning AC system necessary, and Tavares summers offer no exceptions. We replace compressors, condensers, evaporators, expansion valves, and receiver-driers using quality parts and the correct refrigerant for your vehicle. Every AC replacement includes flushing the system where debris may be present, evacuating to remove moisture, recharging to manufacturer specification, and verifying vent temperatures.</p>
        <p>We do not declare a component failed without testing. Our AC replacement recommendations are based on what our diagnosis actually found, not on what is easiest or most profitable to replace.</p>
      faq:
        - q: "How do you know the compressor needs to be replaced vs. repaired?"
          a: "We test compressor output, listen for internal noises, and check the clutch operation. A compressor that is not building pressure or is making grinding sounds has failed internally and requires replacement."
        - q: "Do you replace the receiver-drier when replacing the compressor?"
          a: "Yes. The receiver-drier contains a desiccant that absorbs moisture. Any time the AC system is opened for a major repair, replacing the receiver-drier is standard practice."
        - q: "Can you replace just the AC compressor clutch without replacing the compressor?"
          a: "Sometimes. If the compressor itself is in good condition and only the clutch has failed, replacing just the clutch can save money. We assess and tell you which repair makes sense."
        - q: "How long does a compressor replacement take?"
          a: "Most compressor replacements take a full day."
        - q: "How far is your shop from Tavares?"
