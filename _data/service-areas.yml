      hero_sub: "Full AC component replacement for Mount Dora vehicles. Compressor, condenser, evaporator, and complete system rebuilds."
      body: |
        <h2>AC Replacement Near Mount Dora, FL</h2>
        <p>When an AC component has failed beyond repair, replacement is the right call. RJ Fox Automotive performs complete AC component replacements for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>Florida heat makes a functioning AC system essential, and Mount Dora summers leave no room for a system running at half capacity. We replace compressors, condensers, evaporators, expansion valves, and receiver-driers using quality parts and manufacturer-specified refrigerant. After every AC replacement, we flush the system to remove debris from a failed compressor if needed, evacuate to remove moisture, recharge to spec, and verify vent temperatures before the vehicle leaves.</p>
        <h2>When Is Replacement Necessary?</h2>
        <p>A failed compressor, a damaged condenser from a road debris impact, a cracked evaporator causing refrigerant loss inside the cabin, or a complete system failure after years of deferred maintenance all require component replacement rather than repair. We diagnose the specific failed component before recommending replacement and we give you a written estimate covering all parts and labor.</p>
      faq:
        - q: "How do I know if my AC compressor has failed?"
          a: "A failed compressor often makes a loud noise when the AC is engaged, causes the AC clutch to not engage, or results in warm air despite a full refrigerant charge. We test the compressor electrically and mechanically as part of our AC diagnosis."
        - q: "Do you flush the system after replacing a failed compressor?"
          a: "Yes. A failed compressor sends metal debris into the system. If that debris is not flushed out before a new compressor is installed, it will destroy the new compressor quickly. We flush and install a new receiver-drier as part of every compressor replacement."
        - q: "How long does an AC replacement take?"
          a: "Compressor replacements typically take a full day. Condenser replacements can often be done same-day. Evaporator replacements are more labor-intensive and may require two days."
        - q: "What warranty comes with replacement AC parts?"
          a: "Parts from our suppliers come with a warranty. We document the parts installed and the warranty terms with every repair."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441 from downtown. Turn right on David Walker Dr in Eustis and we are on the right."

    - slug: auto-electrical-repair
