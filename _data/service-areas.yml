      body: |
        <h2>Automotive Diagnostics Near Mount Dora, FL</h2>
        <p>Modern vehicles run multiple interconnected computer systems that monitor everything from engine performance and transmission shifting to braking, stability control, and occupant safety. When something goes wrong, identifying which system is involved and what actually caused the fault requires more than a basic code reader. RJ Fox Automotive performs full-vehicle diagnostic scans at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>We scan every module on the vehicle, not just the engine. A warning light on your dashboard could originate in any of a dozen or more systems. We pull all fault codes from all modules, analyze the data, and then do the hands-on testing needed to confirm the root cause before we write an estimate.</p>
        <p>Vehicles from the Mount Dora area that have had dashboard lights ignored, electrical repairs done elsewhere that left fault codes behind, or recent repairs that triggered new codes all benefit from a full system scan to understand exactly what the vehicle is telling us.</p>
        <h2>Systems We Scan</h2>
        <p>Engine, transmission, ABS and brake system, airbag and SRS system, TPMS, body control module, HVAC control system, power steering, and all available modules. We review all pending and stored codes and live data across the vehicle to give you a complete picture.</p>
      faq:
        - q: "What is the difference between engine diagnostics and full-vehicle diagnostics?"
          a: "Engine diagnostics focuses on the powertrain. Full-vehicle diagnostics scans every control module on the vehicle. If you have multiple warning lights or a concern that goes beyond the engine, a full scan gives us the complete picture."
        - q: "My airbag light is on. Can you diagnose it?"
          a: "Yes. Airbag and SRS faults require a scanner that can communicate with the airbag module. We read and diagnose SRS codes as part of a full-vehicle scan."
        - q: "Can you reset warning lights after a repair?"
          a: "Yes. After confirming the underlying problem is repaired, we clear fault codes and verify the lights do not return."
        - q: "Do warning lights always mean something is broken?"
          a: "Not always. Some warning lights are triggered by sensor malfunctions, loose connections, or software issues rather than a failed component. Diagnosis tells us which it is."
        - q: "How do I get to your shop from Mount Dora?"
          a: "Take US-441 South toward Eustis. Turn right on David Walker Dr and we are on the right side. About ten minutes from downtown Mount Dora."

    - slug: check-engine-light
