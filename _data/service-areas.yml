      hero_sub: "Auto electrical repair for Mount Dora vehicles. Alternators, starters, wiring, and full electrical system diagnosis."
      body: |
        <h2>Electrical Repair Near Mount Dora, FL</h2>
        <p>Electrical problems on modern vehicles can be among the most difficult to diagnose accurately. RJ Fox Automotive handles auto electrical repair for all makes and models at our Eustis shop, about ten minutes from Mount Dora via US-441 South.</p>
        <p>We see electrical issues on vehicles throughout the Mount Dora area, from aging domestic trucks with charging system faults to late-model European vehicles with complex body control module problems. Whatever the make, we approach electrical diagnosis methodically: scan the system, check power and ground circuits, test components under load, and trace faults to the actual failed component before recommending a repair.</p>
        <h2>Common Electrical Repairs</h2>
        <p>Alternator replacement, starter replacement, battery cable and terminal service, fusible link repair, wiring harness repair, power window and door lock module diagnosis, relay and fuse diagnosis, ground fault repair, and charging system testing. We also diagnose electrical faults that are causing other systems to behave erratically, such as transmission shifting issues caused by a faulty speed sensor or brake system faults caused by a wiring problem.</p>
      faq:
        - q: "My car dies after running for a while but starts again when it cools down. What could cause that?"
          a: "Intermittent stalling that correlates with heat is often a crankshaft or camshaft position sensor failing under thermal stress. It can also be a failing ignition module or a voltage regulator issue. We test under the conditions that trigger the fault."
        - q: "Can you diagnose electrical problems that come and go?"
          a: "Intermittent electrical faults are challenging but diagnosable. We use data logging and component testing to catch faults that do not occur every time. This sometimes requires leaving the vehicle with us for a day to capture the fault."
        - q: "My battery warning light came on. Is it the battery or the alternator?"
          a: "A battery warning light usually points to the charging system rather than just the battery. We test alternator output, voltage regulator function, and battery condition to determine which component has failed."
        - q: "Do you repair wiring, or just replace parts?"
          a: "We repair wiring where appropriate. Replacing an entire harness for a single bad wire is wasteful. We locate the fault and make a proper repair."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441 from downtown Mount Dora. Turn right on David Walker Dr in Eustis."

    - slug: battery-testing-replacement
      name: "Battery Service"
      hero_sub: "Battery testing and replacement for Mount Dora vehicles. Full charging system inspection included with every battery service."
      body: |
        <h2>Battery Service Near Mount Dora, FL</h2>
        <p>A failing battery can leave you stranded anywhere from downtown Mount Dora to the parking lot at Renninger's. RJ Fox Automotive performs battery testing and replacement for all vehicle makes and models at our Eustis shop, about ten minutes from Mount Dora on US-441 South.</p>
        <p>Florida heat is hard on batteries. The high temperatures under the hood accelerate internal corrosion and reduce battery life. Most batteries in Florida last three to five years. If your battery is more than three years old and you have had any slow cranking, we recommend having it tested.</p>
        <p>We test the battery under load rather than just checking resting voltage. A battery that reads 12.6 volts at rest may drop to 8 volts when asked to crank the starter, which means it is about to fail. We also test the alternator output and charging system to make sure a bad alternator is not what killed your battery.</p>
        <h2>We Check the Whole Charging System</h2>
        <p>Replacing a battery without checking the alternator is a common mistake. If the alternator is overcharging or undercharging, a new battery will not fix the problem and may be damaged quickly. We test the full charging system with every battery service.</p>
      faq:
        - q: "How do I know if my battery is failing?"
          a: "Slow cranking when starting, especially in the morning, is the most common sign. A clicking sound when you turn the key, a battery warning light, or headlights that dim when the engine is idling also point to a battery or charging system issue."
        - q: "Do I need to replace the battery or just charge it?"
          a: "A battery that has been fully discharged once can sometimes be successfully recharged. A battery that has been deep-cycled multiple times or has failed a load test needs replacement. We test before we recommend."
        - q: "What size battery does my vehicle need?"
          a: "Battery group size, cold cranking amps, and reserve capacity specifications vary by vehicle. We look up the correct battery for your specific year, make, and model."
        - q: "Do you replace batteries in European vehicles?"
          a: "Yes. European vehicles often require battery registration after replacement so the charging system adjusts to the new battery. We perform this procedure where required."
        - q: "How far is your shop from Mount Dora?"
          a: "About ten minutes south on US-441 from the Historic District. Turn right on David Walker Dr in Eustis."

    - slug: diesel-engines
