    - slug: auto-electrical-repair
      name: "Electrical Repair"
      hero_sub: "Auto electrical repair for Tavares vehicles. Alternators, starters, wiring faults, and full electrical diagnosis."
      body: |
        <h2>Electrical Repair Near Tavares, FL</h2>
        <p>Electrical problems are among the most frustrating vehicle issues to deal with, especially intermittent ones that are hard to reproduce. RJ Fox Automotive handles auto electrical repair for all makes and models at our Eustis shop, about ten minutes from Tavares on US-441 or SR-19 South.</p>
        <p>We work on electrical issues across the full range of vehicles that come through Tavares: municipal and government vehicles, domestic trucks, commuter cars, and European imports. Every electrical diagnosis at our shop starts with a full scan to identify all active fault codes, followed by circuit testing, component testing under load, and systematic fault isolation.</p>
        <h2>Common Repairs</h2>
        <p>Alternator and starter replacement, battery cable and terminal service, wiring harness repair, ground fault diagnosis, relay and fuse diagnosis, power window and door lock module issues, and electrical faults causing secondary problems in other systems. We trace faults to the specific failed component rather than replacing parts by guesswork.</p>
      faq:
        - q: "My car stalls randomly and the battery tests fine. What could it be?"
          a: "Random stalling with a good battery often points to a failing crankshaft or camshaft position sensor, an ignition module, or a fuel delivery problem. We test each possibility systematically."
        - q: "Can electrical problems cause transmission shifting issues?"
          a: "Yes. Transmission solenoids, speed sensors, and range sensors are all electrical components. A wiring fault or failed sensor can cause erratic shifting or transmission fault codes."
        - q: "Do you repair wiring or just replace modules and parts?"
          a: "We repair wiring. Many electrical problems are caused by a damaged wire, a corroded connector, or a bad ground that can be repaired properly rather than replacing an expensive module."
        - q: "My car has multiple warning lights on. Is that an electrical problem?"
          a: "Multiple warning lights can stem from a single electrical fault, such as a bad ground or a failed sensor, that affects multiple systems. A full scan tells us what is actually going on."
        - q: "How far is your shop from Tavares?"
          a: "About ten minutes south from downtown Tavares on US-441 or SR-19. Turn onto David Walker Dr in Eustis."

    - slug: battery-testing-replacement
      name: "Battery Service"
      hero_sub: "Battery testing and replacement for Tavares vehicles. Full charging system check with every battery service."
      body: |
        <h2>Battery Service Near Tavares, FL</h2>
        <p>A dead battery can leave you stranded anywhere from the Tavares Seaplane Base to the parking lot at the county courthouse. RJ Fox Automotive performs battery testing and replacement for all makes and models at our Eustis shop, about ten minutes from Tavares on US-441 or SR-19.</p>
        <p>Florida heat accelerates battery degradation. Most batteries in central Florida last three to five years. If yours is approaching that range, or if you have noticed slow cranking, it is worth having it load-tested before it leaves you stranded. We test the battery under load conditions, not just at rest, and we test the alternator and charging system at the same time to make sure a bad alternator is not what killed your battery.</p>
      faq:
        - q: "How do I know if it's the battery or the alternator?"
          a: "A battery warning light usually points to the charging system. If the car starts fine when cold but dies after running, the alternator may not be charging the battery. We test both together to be sure."
        - q: "Do I need to reprogram anything after a battery replacement?"
          a: "Some European vehicles require battery registration after replacement. Some vehicles need their power windows and radio presets reset. We handle all of this as part of the battery replacement service."
        - q: "How long does a battery replacement take?"
          a: "Usually under an hour including the charging system test."
        - q: "Can you test my battery without an appointment?"
