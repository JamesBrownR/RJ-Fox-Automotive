transmission-repair:
  heading: "Transmission Services We Perform"
  items:
    - name: "Transmission Diagnosis"
      desc: "Full system scan, road test, fluid inspection, and fault code analysis to identify the exact cause before any repair is recommended."
    - name: "Automatic Transmission Repair"
      desc: "Solenoid replacement, valve body service, torque converter replacement, seal and gasket repair, and internal component rebuilds."
    - name: "Manual Transmission Repair"
      desc: "Synchronizer and shift fork replacement, bearing service, input and output shaft repair, and clutch fork and linkage work."
    - name: "CVT Repair and Service"
      desc: "CVT-specific fluid exchange using manufacturer-specified fluid, belt and pulley inspection, and shudder diagnosis."
    - name: "Transmission Rebuild"
      desc: "Complete teardown, inspection, and reassembly to factory specification with replacement of all worn internal components."
    - name: "Transmission Replacement"
      desc: "Sourcing and installation of remanufactured or rebuilt replacement units when repair is not cost-effective."
    - name: "Fluid and Filter Service"
      desc: "Drain, pan drop, filter replacement, pan gasket service, and refill with the correct manufacturer-specified fluid."
    - name: "Leak Repair"
      desc: "Diagnosis and repair of external leaks at the pan, cooler lines, input and output shaft seals, and transmission case."

transmission-replacement:
  heading: "Transmission Replacement Services We Perform"
  items:
    - name: "Diagnosis and Options Consultation"
      desc: "Full diagnosis to confirm replacement is the right path, with honest pricing on repair, rebuild, and replacement options."
    - name: "Remanufactured Unit Installation"
      desc: "Sourcing and installation of remanufactured transmissions rebuilt to factory specification by specialist facilities."
    - name: "Used Unit Installation"
      desc: "Installation of used transmissions from donor vehicles when budget constraints make new or reman units impractical."
    - name: "Fluid Fill to Specification"
      desc: "Every replacement is filled with the correct manufacturer-specified fluid type at the proper quantity."
    - name: "Related Component Inspection"
      desc: "Inspection of mounts, cooler lines, driveshafts, and surrounding components while the transmission is out."
    - name: "Post-Install Road Test"
      desc: "Full road test to verify proper shift operation and confirm no fluid leaks before the vehicle is returned."

transmission-maintenance:
  heading: "Transmission Maintenance Services We Perform"
  items:
    - name: "Fluid Drain and Inspection"
      desc: "Draining and examining the old fluid for color, smell, and metal contamination to assess transmission health."
    - name: "Pan Drop and Cleaning"
      desc: "Removing the transmission pan and cleaning it thoroughly to remove accumulated debris and sludge."
    - name: "Filter Replacement"
      desc: "Replacing the transmission filter with the correct filter for your specific make, model, and year."
    - name: "Pan Gasket Replacement"
      desc: "Installing a new pan gasket to ensure a clean, leak-free seal on reinstallation."
    - name: "Fluid Refill to Specification"
      desc: "Refilling with the exact fluid type and quantity specified by the manufacturer for your vehicle."
    - name: "External Leak Inspection"
      desc: "Checking cooler lines, external seals, and the pan for any developing leaks while the vehicle is in the shop."
    - name: "Road Test"
      desc: "Post-service road test to confirm proper shift quality before the vehicle leaves the shop."

transmission-flush:
  heading: "Transmission Flush Services We Perform"
  items:
    - name: "Full Fluid Exchange"
      desc: "Complete exchange of all transmission fluid including what remains in the torque converter and cooler lines."
    - name: "Pan Drop and Inspection"
      desc: "Removing the pan and inspecting it for metal debris or clutch material that would indicate internal wear."
    - name: "Filter Replacement"
      desc: "Replacing the transmission filter as part of the complete service."
    - name: "Pre-Flush Fluid Assessment"
      desc: "Evaluating fluid condition before the flush to determine whether a flush or a simpler drain-and-fill is appropriate."
    - name: "Correct Fluid Verification"
      desc: "Confirming the manufacturer-specified fluid for your vehicle before any fluid is added."
    - name: "Road Test"
      desc: "Test drive after service to verify shift quality and confirm the transmission is operating correctly."

automatic-transmission-service:
  heading: "Automatic Transmission Services We Perform"
  items:
    - name: "Fluid Drain and Inspection"
      desc: "Draining and evaluating the old fluid for color, smell, and metal contamination before refilling."
    - name: "Pan Drop and Debris Inspection"
      desc: "Removing and inspecting the transmission pan for accumulated debris, metal particles, or clutch material."
    - name: "Pan Cleaning"
      desc: "Thoroughly cleaning the pan before reinstallation to remove any residue or built-up contamination."
    - name: "Filter Replacement"
      desc: "Installing the correct replacement filter for your specific automatic transmission."
    - name: "Pan Gasket Service"
      desc: "Replacing the pan gasket to ensure a proper seal and prevent fluid leaks."
    - name: "Fluid Refill to Spec"
      desc: "Refilling with the manufacturer-specified automatic transmission fluid at the correct quantity."
    - name: "Cooler Line and Seal Inspection"
      desc: "Checking external cooler lines, the dipstick tube, and all accessible seals for signs of leakage."
    - name: "Post-Service Road Test"
      desc: "Road testing to verify shift quality and confirm correct fluid level and operation."

cvt-transmission-service:
  heading: "CVT Services We Perform"
  items:
    - name: "CVT Fluid Exchange"
      desc: "Draining and replacing CVT fluid with the correct manufacturer-specified formulation for your make and model."
    - name: "CVT Shudder Diagnosis"
      desc: "Diagnosing shudder between 25 and 45 mph, including fluid condition assessment and belt wear evaluation."
    - name: "Pan Service"
      desc: "Pan drop, inspection, and filter replacement where the CVT design allows for it."
    - name: "Fluid Condition Assessment"
      desc: "Evaluating old CVT fluid for degradation, contamination, and signs of internal wear before recommending service."
    - name: "Correct Fluid Verification"
      desc: "Verifying the OEM-spec CVT fluid required for your specific make and model before any service is performed."
    - name: "Road Test"
      desc: "Post-service test drive to verify smooth, shudder-free operation across the full speed range."

clutch-repair:
  heading: "Clutch Services We Perform"
  items:
    - name: "Clutch Disc Replacement"
      desc: "Replacing the friction disc that transfers power between the engine and transmission."
    - name: "Pressure Plate Replacement"
      desc: "Replacing the pressure plate that clamps the clutch disc against the flywheel."
    - name: "Release Bearing Replacement"
      desc: "Replacing the release bearing that engages and disengages the clutch when the pedal is pressed."
    - name: "Pilot Bearing Replacement"
      desc: "Replacing the pilot bearing that supports the transmission input shaft in the crankshaft."
    - name: "Flywheel Resurfacing or Replacement"
      desc: "Resurfacing the flywheel if within spec, or replacing it if cracked, heat-spotted, or below minimum thickness."
    - name: "Hydraulic Clutch System Service"
      desc: "Inspection and replacement of master cylinders, slave cylinders, and clutch lines on hydraulic clutch systems."
    - name: "Clutch Adjustment"
      desc: "Adjusting cable-operated clutch systems to restore proper pedal feel and engagement point."
    - name: "Transmission Reinstallation and Road Test"
      desc: "Proper transmission reinstallation, clutch break-in procedure, and road test to verify correct operation."

engine-repair:
  heading: "Engine Repair Services We Perform"
  items:
    - name: "Head Gasket Replacement"
      desc: "Cylinder head removal, machining or replacement if warped, and reassembly with new gaskets to factory torque specifications."
    - name: "Timing Belt Replacement"
      desc: "Timing belt, water pump, tensioner, and idler pulley replacement as a complete service to prevent catastrophic failure."
    - name: "Timing Chain Service"
      desc: "Timing chain, guides, tensioners, and variable valve timing components on engines that use chain drive systems."
    - name: "Oil Leak Repair"
      desc: "Diagnosis and repair of leaks at valve covers, intake manifolds, rear main seals, oil pans, and other engine sealing surfaces."
    - name: "Overheating Diagnosis and Repair"
      desc: "Identifying the cause of overheating and repairing the failed component, whether thermostat, water pump, radiator, or head gasket."
    - name: "Water Pump Replacement"
      desc: "Water pump replacement including associated hoses and coolant system service."
    - name: "Intake Manifold Gasket Replacement"
      desc: "Replacing failed intake manifold gaskets that cause vacuum leaks, coolant leaks, or oil leaks."
    - name: "Valve Train Service"
      desc: "Valve adjustment, rocker arm service, and valve cover gasket replacement."

engine-rebuild:
  heading: "Engine Rebuild Services We Perform"
  items:
    - name: "Complete Engine Teardown"
      desc: "Full disassembly of the engine down to bare components for inspection, cleaning, and measurement."
    - name: "Block Inspection and Machine Work"
      desc: "Boring and honing cylinders to accept new pistons and rings at correct clearances, performed by a qualified machine shop."
    - name: "Cylinder Head Rebuild"
      desc: "Head resurfacing, valve grinding, valve stem seal replacement, and reassembly to factory specification."
    - name: "Crankshaft Service"
      desc: "Crankshaft measurement, regrinding if needed, and replacement of main and rod bearings to correct clearances."
    - name: "Piston and Ring Replacement"
      desc: "New pistons and rings installed at correct ring gaps and piston-to-wall clearances."
    - name: "Bearing Replacement Throughout"
      desc: "Replacement of all main, rod, and cam bearings as a standard part of any complete engine rebuild."
    - name: "Gasket and Seal Kit"
      desc: "All engine gaskets and seals replaced as part of the rebuild to ensure a leak-free assembly."
    - name: "Engine Reinstallation and Break-In"
      desc: "Reinstallation in the vehicle, initial startup procedure, oil pressure verification, and break-in monitoring."

engine-diagnostics:
  heading: "Engine Diagnostic Services We Perform"
  items:
    - name: "OBD-II Fault Code Retrieval"
      desc: "Reading all stored and pending fault codes from the engine control module along with freeze frame data."
    - name: "Live Data Analysis"
      desc: "Monitoring sensor outputs, fuel trims, oxygen sensor behavior, and other parameters in real time while the engine runs."
    - name: "Compression Testing"
      desc: "Measuring compression in each cylinder to assess the mechanical health of rings, valves, and head gasket."
    - name: "Leak-Down Testing"
      desc: "Pressurizing each cylinder to identify where compression is being lost and confirm the cause."
    - name: "Fuel System Testing"
      desc: "Testing fuel pressure, injector operation, and fuel delivery volume to rule out fuel system faults."
    - name: "Ignition System Testing"
      desc: "Testing spark output, coil-on-plug performance, and secondary ignition circuit integrity."
    - name: "Vacuum Leak Detection"
      desc: "Using smoke or propane to find air entering the intake system downstream of the mass airflow sensor."
    - name: "Cooling System Pressure Test"
      desc: "Pressure testing the cooling system to identify leaks and performing a combustion gas test when head gasket failure is suspected."

automotive-diagnostics:
  heading: "Diagnostic Services We Perform"
  items:
    - name: "Full-Vehicle System Scan"
      desc: "Scanning every control module on the vehicle, not just the engine, to retrieve all stored fault codes across all systems."
    - name: "Engine Control Module Diagnostics"
      desc: "Reading engine codes, live data, and fuel system parameters to identify powertrain faults."
    - name: "Transmission Control Module Diagnostics"
      desc: "Diagnosing transmission-related codes and live data including shift timing and torque converter operation."
    - name: "ABS and Stability Control Diagnostics"
      desc: "Reading wheel speed sensor faults, ABS module codes, and stability control system faults."
    - name: "Airbag and SRS System Diagnostics"
      desc: "Reading airbag and supplemental restraint system codes that require dedicated airbag scanner access."
    - name: "TPMS Diagnostics"
      desc: "Identifying which tire pressure sensor has faulted or lost battery charge and programming replacements."
    - name: "Body Control Module Diagnostics"
      desc: "Diagnosing faults in lighting, power windows, door locks, and other body electrical functions."
    - name: "Charging and Electrical System Testing"
      desc: "Testing alternator output, battery condition, and charging system voltage alongside module diagnostics."

check-engine-light:
  heading: "Check Engine Light Services We Perform"
  items:
    - name: "Fault Code Retrieval and Analysis"
      desc: "Reading all stored, pending, and permanent codes along with freeze frame data to understand when and how the fault occurred."
    - name: "Live Data Analysis"
      desc: "Monitoring fuel trims, oxygen sensor readings, and other parameters in real time to identify underlying issues."
    - name: "Misfire Diagnosis"
      desc: "Identifying the specific cause of misfire codes, whether ignition, fuel, compression, or mechanical."
    - name: "Oxygen Sensor Testing"
      desc: "Testing upstream and downstream oxygen sensor response and voltage output to distinguish sensor faults from real fuel mixture issues."
    - name: "Fuel System Diagnosis"
      desc: "Testing fuel pressure, injector operation, and mass airflow sensor performance related to fuel-related codes."
    - name: "Emissions System Testing"
      desc: "Diagnosing evaporative emissions codes, catalytic converter efficiency codes, and EGR system faults."
    - name: "Root Cause Confirmation"
      desc: "Going beyond the code to confirm the specific failed component before any repair is recommended."
    - name: "Fault Code Clearing and Verification"
      desc: "Clearing codes after a confirmed repair and verifying the system does not re-flag the fault."

ac-installation-repair:
  heading: "AC Services We Perform"
  items:
    - name: "Full AC System Diagnosis"
      desc: "High and low side pressure testing, component inspection, compressor clutch evaluation, and electrical system check before any repair is recommended."
    - name: "Refrigerant Leak Detection"
      desc: "Using electronic leak detectors and UV dye to locate refrigerant leaks at fittings, hoses, the condenser, evaporator, and compressor seals."
    - name: "Refrigerant Recovery and Recharge"
      desc: "Recovering existing refrigerant before opening the system, then recharging to the manufacturer's specified weight after repairs."
    - name: "Compressor Installation"
      desc: "Compressor replacement including system flush, receiver-drier replacement, and orifice tube or expansion valve replacement."
    - name: "Condenser Replacement"
      desc: "Replacing damaged or leaking condensers with proper O-rings and fittings at all connection points."
    - name: "Evaporator Replacement"
      desc: "Dashboard removal and evaporator core replacement for vehicles with internal evaporator leaks."
    - name: "Expansion Valve and Orifice Tube Service"
      desc: "Replacing failed expansion valves or orifice tubes that cause inconsistent cooling or evaporator icing."
    - name: "Cabin Air Filter Replacement"
      desc: "Replacing clogged cabin air filters that restrict airflow and reduce AC cooling capacity."

auto-ac-recharge:
  heading: "AC Recharge Services We Perform"
  items:
    - name: "System Pressure Testing"
      desc: "Checking high and low side pressures before adding any refrigerant to assess system condition."
    - name: "Leak Detection"
      desc: "Using electronic leak detectors and UV dye to locate the source of refrigerant loss before recharging."
    - name: "Refrigerant Recovery"
      desc: "Recovering any remaining refrigerant in the system before recharging so the system is filled to the correct weight, not just topped off."
    - name: "Leak Repair"
      desc: "Repairing accessible leaks at O-rings, fittings, and hoses before recharging to prevent repeat refrigerant loss."
    - name: "Recharge to Manufacturer Specification"
      desc: "Charging to the specific refrigerant weight listed in the service information, not until gauges look approximately right."
    - name: "Vent Temperature Verification"
      desc: "Measuring outlet vent temperature after recharging to confirm the system is performing correctly."

auto-ac-replacement:
  heading: "AC Replacement Services We Perform"
  items:
    - name: "Compressor Replacement"
      desc: "Full compressor replacement including system flush, receiver-drier, and orifice tube or expansion valve to protect the new compressor."
    - name: "Condenser Replacement"
      desc: "Condenser replacement for units damaged by road debris or corroded at the inlet and outlet connections."
    - name: "Evaporator Replacement"
      desc: "Dashboard disassembly and evaporator core replacement on vehicles with internal evaporator leaks or corrosion."
    - name: "Expansion Valve Replacement"
      desc: "Replacing failed expansion valves that cause evaporator icing or inconsistent refrigerant flow."
    - name: "Receiver-Drier and Accumulator Replacement"
      desc: "Replacing desiccant components whenever the AC system is opened for a major repair."
    - name: "Hose and Line Replacement"
      desc: "Replacing deteriorated or damaged AC hoses, flex lines, and hard line sections."
    - name: "System Evacuation and Recharge"
      desc: "Full vacuum evacuation to remove moisture before recharging to the manufacturer-specified refrigerant weight."
    - name: "Post-Installation Performance Verification"
      desc: "Verifying vent temperatures and system pressures after every AC replacement before the vehicle is returned."

auto-electrical-repair:
  heading: "Electrical Services We Perform"
  items:
    - name: "Battery Testing and Replacement"
      desc: "Load testing to evaluate true battery capacity followed by proper replacement with the correct group size and CCA rating."
    - name: "Alternator Service"
      desc: "Alternator output testing and replacement when no longer maintaining proper charging voltage while the engine runs."
    - name: "Starter Repair and Replacement"
      desc: "Diagnosis and replacement of failed starters and starter solenoids after confirming the battery and circuit are not the cause."
    - name: "Parasitic Draw Diagnosis"
      desc: "Systematic isolation of circuits to identify components drawing excessive current from the battery when the vehicle is off."
    - name: "Wiring Repair"
      desc: "Repair of damaged, corroded, or chafed wiring using correct wire gauge, connectors, and heat-shrink protection."
    - name: "Ground Fault Diagnosis"
      desc: "Locating poor or failed ground connections that cause erratic electrical behavior across multiple systems."
    - name: "Fuse and Relay Diagnosis"
      desc: "Identifying the cause of repeatedly blown fuses and failed relays rather than simply replacing them."
    - name: "Charging System Testing"
      desc: "Complete evaluation of the battery, alternator, voltage regulator, cables, and related wiring as a system."

battery-testing-replacement:
  heading: "Battery Services We Perform"
  items:
    - name: "Battery Load Testing"
      desc: "Testing the battery under the actual current draw a starter requires to determine true remaining capacity."
    - name: "State of Charge Verification"
      desc: "Confirming the battery is fully charged before load testing to ensure accurate results."
    - name: "Terminal and Cable Inspection"
      desc: "Inspecting battery terminals and cables for corrosion, loose connections, and insulation damage."
    - name: "Alternator Output Testing"
      desc: "Testing alternator output voltage and current alongside battery testing to identify charging system faults."
    - name: "Battery Replacement"
      desc: "Installing the correct replacement battery for your vehicle's group size, CCA requirement, and terminal configuration."
    - name: "Terminal Cleaning and Treatment"
      desc: "Cleaning terminals and applying anti-corrosion treatment on installation to extend connection life."
    - name: "Battery Registration"
      desc: "Performing battery registration procedures on European vehicles that require ECU notification after battery replacement."
    - name: "Post-Replacement Charging System Verification"
      desc: "Confirming the alternator is properly charging the new battery before the vehicle leaves the shop."

diesel-engines:
  heading: "Diesel Services We Perform"
  items:
    - name: "Diesel Diagnostics"
      desc: "Full system scan for diesel-specific fault codes covering injectors, turbo boost, EGR, DPF, and fuel rail pressure."
    - name: "Fuel System Service"
      desc: "Fuel filter replacement, water separator draining, lift pump testing, and fuel delivery diagnosis."
    - name: "Injector Diagnosis and Replacement"
      desc: "Individual injector contribution testing and replacement of injectors that are outside acceptable fuel delivery range."
    - name: "Glow Plug Replacement"
      desc: "Individual glow plug testing and replacement of failed plugs that cause hard cold starting and white smoke on startup."
    - name: "Turbocharger Inspection and Service"
      desc: "Inspecting turbo shaft play, boost leaks, oil supply lines, and actuator function to assess turbo condition."
    - name: "EGR System Service"
      desc: "EGR valve cleaning or replacement, EGR cooler inspection, and carbon buildup removal from intake passages."
    - name: "DPF Service"
      desc: "DPF regeneration forced cycles, cleaning, and replacement for diesel particulate filters that have exceeded normal regeneration capacity."
    - name: "Diesel Oil and Filter Service"
      desc: "Oil and filter changes using the correct API-rated oil specification for your specific diesel engine."

auto-brake-repair:
  heading: "Brake Services We Perform"
  items:
    - name: "Brake Pad Replacement"
      desc: "Replacing worn brake pads with quality pads matched to your vehicle and driving style, including new hardware and caliper lubrication."
    - name: "Rotor Resurfacing"
      desc: "Machining rotors on a brake lathe to restore a flat, smooth braking surface when the rotor is within minimum thickness specification."
    - name: "Rotor Replacement"
      desc: "Replacing rotors that have worn below minimum thickness, developed heat cracks, or have deep scoring from metal-on-metal contact."
    - name: "Caliper Service and Replacement"
      desc: "Rebuilding or replacing seized calipers that cause brake drag, uneven pad wear, or pulling under braking."
    - name: "Brake Fluid Flush"
      desc: "Flushing degraded brake fluid and replacing with fresh fluid to restore the correct boiling point and prevent corrosion."
    - name: "Brake Line and Hose Replacement"
      desc: "Replacing corroded steel brake lines and deteriorated rubber hoses that restrict hydraulic pressure or develop leaks."
    - name: "ABS System Diagnosis"
      desc: "Reading ABS fault codes, testing wheel speed sensors, and diagnosing ABS module issues that trigger the ABS warning light."
    - name: "Parking Brake Adjustment and Service"
      desc: "Adjusting or servicing the parking brake mechanism to restore proper holding force."

steering-suspension-repair:
  heading: "Steering and Suspension Services We Perform"
  items:
    - name: "Shock Absorber and Strut Replacement"
      desc: "Replacing worn shocks and struts that no longer control suspension movement, affecting handling, stopping distance, and tire wear."
    - name: "Tie Rod Replacement"
      desc: "Replacing inner and outer tie rod ends that have developed play, causing vague steering and uneven tire wear."
    - name: "Ball Joint Replacement"
      desc: "Replacing worn ball joints that affect steering precision and represent a safety risk if allowed to progress to failure."
    - name: "Control Arm and Bushing Service"
      desc: "Replacing control arms and pressed-in bushings that have deteriorated and introduced looseness into the suspension geometry."
    - name: "Sway Bar Link and Bushing Replacement"
      desc: "Replacing worn sway bar end links and bushings that cause clunking over bumps and increased body roll."
    - name: "Wheel Bearing Replacement"
      desc: "Diagnosing and replacing failed wheel bearings that produce a humming or growling noise that changes with vehicle speed."
    - name: "Power Steering Service"
      desc: "Diagnosing and repairing hydraulic power steering leaks, pump failures, and rack and pinion issues."
    - name: "Electric Power Steering Diagnosis"
      desc: "Diagnosing faults in the EPS motor, sensors, and control module that affect steering effort and return."

wheel-alignment:
  heading: "Wheel Alignment Services We Perform"
  items:
    - name: "Four-Wheel Alignment"
      desc: "Measuring and adjusting all four wheels simultaneously against manufacturer specifications for toe, camber, and caster."
    - name: "Two-Wheel Alignment"
      desc: "Front axle alignment for vehicles with solid rear axles that have no adjustable rear geometry."
    - name: "Toe Adjustment"
      desc: "Correcting inward or outward tire angles that cause rapid edge wear and affect straight-line tracking."
    - name: "Camber Adjustment"
      desc: "Adjusting wheel lean angle where the suspension design allows, addressing edge wear and cornering behavior."
    - name: "Caster Adjustment"
      desc: "Correcting steering axis angle where adjustable, affecting straight-line stability and steering returnability."
    - name: "Pre-Alignment Suspension Inspection"
      desc: "Inspecting all suspension and steering components for wear before aligning to ensure the alignment will hold."
    - name: "Post-Suspension Repair Alignment"
      desc: "Alignment performed after any steering or suspension repair that changes wheel geometry."
    - name: "Alignment Documentation"
      desc: "Providing before-and-after alignment printouts showing measured angles versus factory specification."

adas-calibration:
  heading: "ADAS Calibration Services We Perform"
  items:
    - name: "Forward Camera Calibration"
      desc: "Static and dynamic calibration of forward-facing cameras used by lane departure warning, automatic emergency braking, and adaptive cruise control."
    - name: "Radar Sensor Calibration"
      desc: "Calibrating front and rear radar sensors used for adaptive cruise control, forward collision warning, and blind spot monitoring."
    - name: "Blind Spot Monitor Calibration"
      desc: "Calibrating rear corner radar sensors that monitor the blind spot zones alongside the vehicle."
    - name: "Lane Departure System Calibration"
      desc: "Restoring proper lane detection angles after windshield replacement, alignment, or suspension work."
    - name: "Automatic Emergency Braking Calibration"
      desc: "Ensuring the forward collision detection system is correctly aimed to trigger at the proper distance and speed."
    - name: "Adaptive Cruise Control Calibration"
      desc: "Calibrating the radar system that controls following distance and speed matching in adaptive cruise systems."
    - name: "Post-Windshield Replacement Calibration"
      desc: "Recalibrating forward cameras that are mounted to or behind the windshield after glass replacement."
    - name: "Post-Alignment Calibration Verification"
      desc: "Verifying ADAS system function after wheel alignments or suspension repairs that affect ride height and camera angle."

general-repairs-maintenance:
  heading: "General Maintenance Services We Perform"
  items:
    - name: "Oil and Filter Change"
      desc: "Oil and filter replacement using the correct oil specification for your engine, with fluid level and condition checks throughout the vehicle."
    - name: "Air Filter Replacement"
      desc: "Replacing the engine air filter when restricted by pollen, dust, and debris common in central Florida's environment."
    - name: "Cabin Air Filter Replacement"
      desc: "Replacing the filter that cleans air entering the passenger compartment through the HVAC system."
    - name: "Spark Plug Replacement"
      desc: "Replacing spark plugs using the correct plug type, heat range, and gap specification for your engine."
    - name: "Serpentine Belt Replacement"
      desc: "Replacing the drive belt that powers the alternator, power steering pump, AC compressor, and water pump."
    - name: "Timing Belt Replacement"
      desc: "Replacing timing belts on interference engines before failure causes internal engine damage."
    - name: "Coolant System Service"
      desc: "Testing, flushing, and replacing coolant to maintain corrosion protection and freeze point specification."
    - name: "Multi-Point Vehicle Inspection"
      desc: "Systematic check of brakes, tires, fluids, belts, hoses, lights, and steering and suspension during every service visit."

auto-exhaust-system-repair:
  heading: "Exhaust Services We Perform"
  items:
    - name: "Muffler Replacement"
      desc: "Replacing corroded or failed mufflers that produce excessive exhaust noise or allow exhaust gases to escape."
    - name: "Catalytic Converter Diagnosis and Replacement"
      desc: "Diagnosing the root cause of P0420 and P0430 codes before replacing the converter to prevent early failure of the new unit."
    - name: "Exhaust Pipe Repair and Replacement"
      desc: "Repairing or replacing corroded, cracked, or separated exhaust pipe sections from the manifold to the tailpipe."
    - name: "Flex Pipe Replacement"
      desc: "Replacing flexible exhaust sections that absorb engine movement and are a frequent failure point on many vehicles."
    - name: "Exhaust Manifold Service"
      desc: "Replacing exhaust manifold gaskets that cause ticking or tapping on cold starts, and manifold replacement when cracked."
    - name: "Oxygen Sensor Replacement"
      desc: "Testing and replacing upstream and downstream oxygen sensors that affect fuel delivery and converter efficiency monitoring."
    - name: "Exhaust Leak Repair"
      desc: "Locating and repairing leaks at manifold gaskets, pipe connections, and welded joints that allow exhaust gases to escape."
    - name: "Heat Shield Service"
      desc: "Securing or replacing loose heat shields that rattle over bumps or have detached from the exhaust system."

u-haul-services:
  heading: "U-Haul Services We Offer"
  items:
    - name: "Moving Truck Rentals"
      desc: "Cargo vans and moving trucks in multiple sizes for studio through large household moves, local and long-distance."
    - name: "Trailer Rentals"
      desc: "Enclosed and open trailers for hauling furniture, equipment, and vehicles."
    - name: "One-Way Rentals"
      desc: "One-way rental options for moves out of the area where you return the truck to a different U-Haul location."
    - name: "In-Town Rentals"
      desc: "Local rental options for moves within Lake County, typically priced per mile plus a daily rate."
    - name: "Reservation Assistance"
      desc: "Help selecting the right truck or trailer size for your load and confirming availability for your move date."
    - name: "Pickup and Return"
      desc: "Truck pickup and return at our Eustis location on David Walker Dr during regular business hours."
