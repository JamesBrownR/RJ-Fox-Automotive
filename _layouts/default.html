    <style>
        :root {
            --primary-blue: #004aad; /* Matched from your screenshot button */
            --accent-yellow: #ffc107; /* Matched from the car */
            --dark-bg: #1a1a1a;
        }
        body { font-family: 'Open Sans', sans-serif; }
        h1, h2, h3, h4, h5, .navbar-brand { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        
        .btn-primary { background-color: var(--primary-blue); border: none; padding: 10px 25px; font-weight: bold; }
        .btn-primary:hover { background-color: #003380; }
        
        .section-padding { padding: 80px 0; }
        .bg-dark-custom { background-color: var(--dark-bg); color: white; }
        
        /* Navbar tweaks */
        .navbar-brand { font-size: 1.8rem; font-weight: 700; }
        .nav-link { font-weight: 600; font-size: 1.1rem; margin-left: 15px; }
        
        /* Review Cards */
        .review-card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .review-card:hover { transform: translateY(-5px); }
        .stars { color: var(--accent-yellow); }

         @font-face {
    font-family: 'Open Sans';
    src: url('/fonts/OpenSans-Regular.woff2') format('woff2'),
         url('/fonts/OpenSans-Regular.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Open Sans';
    src: url('/fonts/OpenSans-SemiBold.woff2') format('woff2'),
         url('/fonts/OpenSans-SemiBold.woff') format('woff');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Oswald';
    src: url('/fonts/Oswald-Medium.woff2') format('woff2'),
         url('/fonts/Oswald-Medium.woff') format('woff');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Oswald';
    src: url('/fonts/Oswald-Bold.woff2') format('woff2'),
         url('/fonts/Oswald-Bold.woff') format('woff');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

    </style>
</head>
